version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: suetogether-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: suetogether
      POSTGRES_USER: suetogether
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U suetogether']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: suetogether-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: suetogether-api
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://suetogether:${DB_PASSWORD:-devpassword}@postgres:5432/suetogether
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-pipeline:
    build:
      context: ./services/ml-pipeline
      dockerfile: Dockerfile
    container_name: suetogether-ml
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://suetogether:${DB_PASSWORD:-devpassword}@postgres:5432/suetogether

volumes:
  pgdata:
